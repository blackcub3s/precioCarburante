<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estimació preu carburant 22 març a partir preu 21 de març</title>
    <script src = "./js/calculs.js"></script>
    <link rel="stylesheet" href="./css/estils.css">
</head>
<body>
    <section id = "contenidorPare">
        <section>
            <p><b>Introdueix el preu d'ahir 21 de març <br><span class="textPetito"><i>[IVA 21% -- IEH habitual (<a href="https://www.boe.es/eli/es/l/1992/12/28/38/con">RD 38/1992</a>)]:</b></i></span></p>
            <div class="input-wrapper">
                <input id="entrada21perCent" type="number">
            </div>
            <fieldset>
                <legend>Sel·lecciona carburant:</legend>

                <div>
                    <input type="radio" id="radioDiesel" name="carburant" value="D" checked>
                    <label for="radioDiesel">Dièsel</label>
                </div>

                <div>
                    <input type="radio" id="radioGasolina" name="carburant" value="G">
                    <label for="radioGasolina">Gasolina 95</label>
                </div>
            </fieldset>
                
        </section>

        <div id = "rallaHoritzontal"></div>


        <section>
            <p><b>Preu esperat en surtidor el 22 de març <br><span class="textPetito"><i>[iva 10% | IEH <a href="https://www.boe.es/boe/dias/2026/03/21/pdfs/BOE-A-2026-6544.pdf">RD 21 març 2026</a>]:</b></i></span></p>
            <p id = "sortidaDades10perCent"></p>
        </section>
    </section>
</body>
</html>
